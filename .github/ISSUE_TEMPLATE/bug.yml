name: Defeito reproduzível
description: Relate erro técnico, editorial, pedagógico ou operacional com evidência mínima.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Não inclua segredos, dados pessoais, credenciais ou detalhes de vulnerabilidade explorável. Casos de segurança devem seguir `SECURITY.md`.
  - type: dropdown
    id: area
    attributes:
      label: Área afetada
      options:
        - Curso ou módulo
        - Laboratório
        - Projeto ou rubrica
        - Exemplo ou código
        - Documentação e links
        - CI ou validação
        - Acessibilidade
        - Internacionalização
        - Outra
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Resultado observado
      description: Descreva o que ocorreu, sem inserir dados sensíveis.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reprodução mínima
      description: Informe caminho, comandos, entrada sintética e passos numerados.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Commit, branch ou versão
      placeholder: SHA completo ou branch
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidências sanitizadas
      description: Logs redigidos, mensagem de erro, captura acessível ou saída do validador.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impacto estimado
      options:
        - Baixo — cosmético ou alternativa simples
        - Médio — bloqueia parte do fluxo
        - Alto — compromete avaliação, segurança, privacidade ou operação
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmações
      options:
        - label: Removi segredos, credenciais e dados pessoais.
          required: true
        - label: Verifiquei que este relato não exige disclosure privado de segurança.
          required: true
        - label: Procurei issues abertas equivalentes.
          required: true
