name: NEXUS Quality

on:
  push:
    branches: [main, audit/premium-elite-v1]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Repository contracts
        run: python tests/validate_repository.py

      - name: Minimal read-only agent
        run: python examples/minimal_readonly_agent.py --self-test

      - name: Context retriever
        run: python examples/context_retriever.py --self-test

      - name: Safe tool boundary
        run: python examples/safe_tool_boundary.py --self-test

      - name: Deterministic loop
        run: python examples/deterministic_loop.py --self-test

      - name: Compile Python examples
        run: python -m compileall -q examples tests

  typescript-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Type-check TypeScript example
        run: npx --yes typescript@5.8.3 --noEmit --target ES2022 --lib ES2022,DOM examples/safe_tool_boundary.ts
