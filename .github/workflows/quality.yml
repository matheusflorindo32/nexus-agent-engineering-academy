name: NEXUS Quality

on:
  workflow_dispatch:
  push:
    branches: [main, audit/premium-elite-v1, feat/module-10-observability-engineering, fix/curriculum-observability-contracts]
  pull_request:

permissions:
  contents: read

concurrency:
  group: nexus-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-python:
    name: Contracts and Python self-tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python quality gates and collect evidence
        run: python tests/run_quality_gates.py --output validation-evidence/python.json

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-python-validation-evidence
          path: validation-evidence/python.json
          if-no-files-found: error
          retention-days: 14

  typescript-contract:
    name: TypeScript boundary contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python for evidence generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Type-check TypeScript example and collect evidence
        shell: bash
        run: |
          mkdir -p validation-evidence
          set +e
          npx --yes --package typescript@5.8.3 tsc --noEmit --strict --target ES2022 --lib ES2022,DOM examples/safe_tool_boundary.ts
          status=$?
          export VALIDATION_STATUS="$status"
          python - <<'PY'
          import datetime
          import json
          import os
          import platform
          from pathlib import Path

          evidence = {
              "schema": "nexus.validation-evidence.v1",
              "commit_sha": os.environ["GITHUB_SHA"],
              "generated_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "environment": {
                  "platform": platform.platform(),
                  "node": os.popen("node --version").read().strip(),
                  "runner_os": os.environ.get("RUNNER_OS", "unknown"),
              },
              "results": [{
                  "name": "typescript-strict",
                  "command": "npx --yes --package typescript@5.8.3 tsc --noEmit --strict --target ES2022 --lib ES2022,DOM examples/safe_tool_boundary.ts",
                  "exit_code": int(os.environ["VALIDATION_STATUS"]),
              }],
              "failures": [] if os.environ["VALIDATION_STATUS"] == "0" else ["typescript-strict"],
              "limitations": ["This job validates only the TypeScript boundary contract."],
          }
          Path("validation-evidence/typescript.json").write_text(
              json.dumps(evidence, indent=2) + "\n", encoding="utf-8"
          )
          PY
          exit "$status"

      - name: Upload TypeScript validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-typescript-validation-evidence
          path: validation-evidence/typescript.json
          if-no-files-found: error
          retention-days: 14
