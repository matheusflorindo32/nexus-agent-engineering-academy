name: Portal Quality

on:
  pull_request:
    paths:
      - 'portal/**'
      - 'course/**'
      - 'labs/**'
      - 'projects/**'
      - '.github/workflows/portal-quality.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portal-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Bootstrap lockfile and validate portal
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feat/portal-lockfile-premium-elite'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout dedicated head branch
        uses: actions/checkout@v4
        with:
          ref: feat/portal-lockfile-premium-elite

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Generate lockfile from fixed manifest
        working-directory: portal
        run: npm install --package-lock-only --no-audit --no-fund --ignore-scripts --loglevel=error

      - name: Assert lockfile contract
        run: |
          test -f portal/package-lock.json
          node -e "const p=require('./portal/package-lock.json'); if(p.lockfileVersion !== 3) process.exit(1);"
          git diff --check
          sha256sum portal/package-lock.json

      - name: Commit candidate lockfile to dedicated branch
        run: |
          if git diff --quiet -- portal/package-lock.json && git ls-files --error-unmatch portal/package-lock.json >/dev/null 2>&1; then
            echo 'Lockfile already versioned; no bootstrap commit required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add portal/package-lock.json
          git commit -m 'build: versionar lockfile auditado do portal'
          git push origin HEAD:feat/portal-lockfile-premium-elite

      - name: Install exactly from generated lockfile
        working-directory: portal
        run: npm ci --no-audit --no-fund --ignore-scripts --loglevel=error

      - name: Typecheck
        working-directory: portal
        run: npm run typecheck

      - name: Build static portal
        working-directory: portal
        env:
          NODE_ENV: production
        run: npm run build
