name: Portal Quality

on:
  pull_request:
    paths:
      - 'portal/**'
      - 'course/**'
      - 'labs/**'
      - 'projects/**'
      - '.github/workflows/portal-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portal-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Reproducible typecheck and portal build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Set up Node.js with lockfile cache
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Record immutable build identity
        run: |
          echo "sha=${GITHUB_SHA}"
          node --version
          npm --version
          test -f portal/package-lock.json
          node -e "const p=require('./portal/package-lock.json'); if(p.lockfileVersion !== 3) process.exit(1);"
          sha256sum portal/package-lock.json | tee portal-lock-before.sha256

      - name: Install exactly from versioned lockfile
        working-directory: portal
        run: npm ci --no-audit --no-fund --ignore-scripts --loglevel=error

      - name: Prove lockfile remained unchanged
        run: |
          sha256sum portal/package-lock.json | tee portal-lock-after.sha256
          diff -u portal-lock-before.sha256 portal-lock-after.sha256
          git diff --exit-code -- portal/package-lock.json portal/package.json

      - name: Typecheck
        working-directory: portal
        run: npm run typecheck

      - name: Build static portal
        working-directory: portal
        env:
          NODE_ENV: production
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../portal-build.log

      - name: Assert critical output
        run: |
          test -f portal/build/index.html
          test -f portal/build/curso.html
          test -f portal/build/laboratorios.html
          test -f portal/build/projetos.html
          test -f portal/build/curso/modules/orientation.html
          test -f portal/build/curso/modules/tool-engineering.html
          test -f portal/build/curso/modules/evaluation-engineering.html
          test -f portal/build/projetos/capstone.html
          find portal/build -type f | sort > portal-build-manifest.txt
          sha256sum portal-build-manifest.txt | tee portal-build-manifest.sha256

      - name: Upload reproducibility evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-reproducible-build-${{ github.sha }}
          path: |
            portal-lock-before.sha256
            portal-lock-after.sha256
            portal-build.log
            portal-build-manifest.txt
            portal-build-manifest.sha256
            portal/build/
          if-no-files-found: warn
          retention-days: 7
