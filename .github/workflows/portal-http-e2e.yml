name: Portal HTTP E2E

on:
  pull_request:
    paths:
      - 'portal/**'
      - '.github/workflows/portal-http-e2e.yml'
      - 'docs/governance/PORTAL_HTTP_E2E.md'

permissions:
  contents: read

jobs:
  http-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install reproducibly
        working-directory: portal
        run: npm ci

      - name: Typecheck and build
        working-directory: portal
        run: |
          npm run typecheck
          npm run build

      - name: Start immutable candidate server
        working-directory: portal
        shell: bash
        run: |
          npm run serve -- --host 127.0.0.1 --port 3000 > /tmp/nexus-http-e2e-server.log 2>&1 &
          echo $! > /tmp/nexus-http-e2e-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/nexus-http-e2e-server.log
          exit 1

      - name: Execute HTTP journey contract
        working-directory: portal
        run: node scripts/http-e2e.mjs

      - name: Stop candidate server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/nexus-http-e2e-server.pid ]; then kill "$(cat /tmp/nexus-http-e2e-server.pid)" || true; fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-http-e2e-${{ github.event.pull_request.head.sha }}
          path: |
            portal/evidence/http-e2e
            /tmp/nexus-http-e2e-server.log
          if-no-files-found: warn
          retention-days: 30
