<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">NEXUS Agent Engineering Academy</title>
  <desc id="desc">Arquitetura animada com núcleo NEXUS conectado aos domínios Agent, Context, Tool, Loop e MCP.</desc>

  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b1d"/>
      <stop offset="0.48" stop-color="#101735"/>
      <stop offset="1" stop-color="#090d22"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5865f2" stop-opacity=".2"/>
      <stop offset=".5" stop-color="#35d7ff" stop-opacity=".9"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity=".2"/>
    </linearGradient>
    <radialGradient id="core" cx="38%" cy="30%" r="72%">
      <stop offset="0" stop-color="#70e8ff"/>
      <stop offset=".4" stop-color="#4776ff"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </radialGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6478ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="context" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18d6b4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="tool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8ca0ff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4L0 8Z" fill="#60ddff" fill-opacity=".75"/>
    </marker>
    <path id="orbit" d="M600 210m-215 0a215 135 0 1 0 430 0a215 135 0 1 0-430 0"/>

    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .wire { fill: none; stroke: #5adcfb; stroke-width: 1.6; stroke-opacity: .34; stroke-dasharray: 7 10; animation: dash 7s linear infinite; }
      .halo { transform-box: fill-box; transform-origin: center; animation: pulse 3.8s ease-in-out infinite; }
      .node { transform-box: fill-box; transform-origin: center; animation: float 5s ease-in-out infinite; }
      .node-b { animation-delay: -.8s; }
      .node-c { animation-delay: -1.7s; }
      .node-d { animation-delay: -2.5s; }
      .node-e { animation-delay: -3.2s; }
      .core-ring { transform-origin: 600px 210px; animation: rotate 18s linear infinite; }
      .particle { animation: travel 8s linear infinite; }
      .particle-b { animation-delay: -2.7s; }
      .particle-c { animation-delay: -5.3s; }
      .scan { animation: scan 5.5s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -68; } }
      @keyframes pulse { 0%,100% { opacity:.22; transform:scale(.96); } 50% { opacity:.58; transform:scale(1.08); } }
      @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
      @keyframes rotate { to { transform:rotate(360deg); } }
      @keyframes travel { from { offset-distance:0%; } to { offset-distance:100%; } }
      @keyframes scan { 0%,100% { opacity:0; transform:translateX(-60px); } 18%,75% { opacity:.42; } 88% { opacity:0; transform:translateX(1150px); } }
      @media (prefers-reduced-motion: reduce) {
        .wire,.halo,.node,.core-ring,.particle,.scan { animation:none !important; }
      }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="438" rx="28" fill="url(#surface)"/>
  <rect x="1" y="1" width="1198" height="438" rx="28" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1197" height="437" rx="27" fill="none" stroke="url(#border)" stroke-width="2"/>
  <ellipse cx="600" cy="215" rx="390" ry="170" fill="#335cff" opacity=".055" filter="url(#softGlow)"/>

  <g opacity=".9">
    <path class="wire" marker-end="url(#arrow)" d="M330 130C420 110 470 145 528 184"/>
    <path class="wire" marker-end="url(#arrow)" d="M870 130C780 110 730 145 672 184"/>
    <path class="wire" marker-end="url(#arrow)" d="M300 300C405 316 475 275 532 238"/>
    <path class="wire" marker-end="url(#arrow)" d="M900 300C795 316 725 275 668 238"/>
    <path class="wire" marker-end="url(#arrow)" d="M600 350C600 310 600 280 600 266"/>
  </g>

  <g class="core-ring" opacity=".78">
    <ellipse cx="600" cy="210" rx="105" ry="105" fill="none" stroke="#5bdcff" stroke-width="1.4" stroke-dasharray="4 13"/>
    <circle cx="600" cy="105" r="4" fill="#7ce9ff" filter="url(#softGlow)"/>
  </g>

  <g filter="url(#shadow)">
    <circle class="halo" cx="600" cy="210" r="84" fill="#4f7cff" opacity=".22" filter="url(#softGlow)"/>
    <circle cx="600" cy="210" r="67" fill="url(#core)"/>
    <circle cx="600" cy="210" r="57" fill="#0d1535" fill-opacity=".32" stroke="#dff8ff" stroke-opacity=".45"/>
    <path d="M600 173l31 18v36l-31 18-31-18v-36z" fill="none" stroke="#fff" stroke-opacity=".9" stroke-width="2"/>
    <path d="M600 173v36m31-18l-31 18-31-18m31 18v36" fill="none" stroke="#fff" stroke-opacity=".48" stroke-width="1.4"/>
    <text x="600" y="216" text-anchor="middle" class="label" fill="#fff" font-size="15" font-weight="800" letter-spacing="2.3">NEXUS</text>
    <text x="600" y="235" text-anchor="middle" class="mono" fill="#b9f3ff" font-size="8.5" letter-spacing="1.1">CONTROL PLANE</text>
  </g>

  <g class="node" filter="url(#shadow)">
    <circle class="halo" cx="255" cy="118" r="55" fill="#6478ff" opacity=".22"/>
    <circle cx="255" cy="118" r="42" fill="url(#agent)"/>
    <text x="255" y="116" text-anchor="middle" class="label" fill="#fff" font-size="12" font-weight="800" letter-spacing="1.5">AGENT</text>
    <text x="255" y="133" text-anchor="middle" class="mono" fill="#eef0ff" font-size="7.5">states · goals</text>
  </g>

  <g class="node node-b" filter="url(#shadow)">
    <circle class="halo" cx="945" cy="118" r="55" fill="#22d3ee" opacity=".2"/>
    <circle cx="945" cy="118" r="42" fill="url(#context)"/>
    <text x="945" y="116" text-anchor="middle" class="label" fill="#051b24" font-size="11" font-weight="900" letter-spacing="1.25">CONTEXT</text>
    <text x="945" y="133" text-anchor="middle" class="mono" fill="#06313d" font-size="7.5">evidence · memory</text>
  </g>

  <g class="node node-c" filter="url(#shadow)">
    <circle class="halo" cx="225" cy="305" r="55" fill="#facc15" opacity=".17"/>
    <circle cx="225" cy="305" r="42" fill="url(#tool)"/>
    <text x="225" y="303" text-anchor="middle" class="label" fill="#251800" font-size="12" font-weight="900" letter-spacing="1.5">TOOL</text>
    <text x="225" y="320" text-anchor="middle" class="mono" fill="#3a2600" font-size="7.5">schema · effects</text>
  </g>

  <g class="node node-d" filter="url(#shadow)">
    <circle class="halo" cx="975" cy="305" r="55" fill="#14b8a6" opacity=".2"/>
    <circle cx="975" cy="305" r="42" fill="url(#loop)"/>
    <text x="975" y="303" text-anchor="middle" class="label" fill="#03231f" font-size="12" font-weight="900" letter-spacing="1.5">LOOP</text>
    <text x="975" y="320" text-anchor="middle" class="mono" fill="#063b35" font-size="7.5">budget · stop</text>
  </g>

  <g class="node node-e" filter="url(#shadow)">
    <circle class="halo" cx="600" cy="355" r="49" fill="#ef4444" opacity=".2"/>
    <circle cx="600" cy="355" r="37" fill="url(#mcp)"/>
    <text x="600" y="353" text-anchor="middle" class="label" fill="#fff" font-size="12" font-weight="900" letter-spacing="1.7">MCP</text>
    <text x="600" y="369" text-anchor="middle" class="mono" fill="#fff1f2" font-size="7.2">protocol · boundary</text>
  </g>

  <circle class="particle" r="4" fill="#8deeff" style="offset-path:path('M330 130C420 110 470 145 528 184')" filter="url(#softGlow)"/>
  <circle class="particle particle-b" r="3.5" fill="#fff0a5" style="offset-path:path('M300 300C405 316 475 275 532 238')" filter="url(#softGlow)"/>
  <circle class="particle particle-c" r="3.5" fill="#92ffd7" style="offset-path:path('M900 300C795 316 725 275 668 238')" filter="url(#softGlow)"/>

  <rect class="scan" x="10" y="2" width="70" height="436" fill="url(#border)" opacity="0"/>

  <text x="48" y="57" class="label" fill="#f4f7ff" font-size="22" font-weight="850" letter-spacing="2.2">NEXUS</text>
  <text x="48" y="80" class="mono" fill="#7bdff7" font-size="10" letter-spacing="2.1">AGENT ENGINEERING ACADEMY</text>
  <text x="1152" y="57" text-anchor="end" class="mono" fill="#7f8eb7" font-size="9" letter-spacing="1.3">CONTRACTS · CONTROL · EVIDENCE</text>
  <text x="1152" y="80" text-anchor="end" class="mono" fill="#536185" font-size="8">production-grade agent systems</text>

  <text x="600" y="416" text-anchor="middle" class="mono" fill="#7786ad" font-size="8.5" letter-spacing="2.2">ENGINEER SYSTEMS YOU CAN EXPLAIN · EVALUATE · CONTROL · STOP</text>
</svg>
